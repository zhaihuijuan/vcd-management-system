version: '3.8'

services:

  # ===== SQL Server 数据库 =====
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: vcd-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "123456Aa!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./script.sql:/docker-entrypoint-initdb.d/script.sql
    networks:
      - vcd-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "123456Aa!", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ===== Spring Boot 后端 =====
  backend:
    build:
      context: ./vcd-backend
      dockerfile: Dockerfile
    container_name: vcd-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://sqlserver:1433;databaseName=vcddb;encrypt=false;trustServerCertificate=true"
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: "123456Aa!"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - vcd-network
    restart: on-failure

networks:
  vcd-network:
    driver: bridge

volumes:
  sqlserver_data:
